# nginx reverse proxy configuration for fileserv
# Adjust server_name and ssl_certificate paths for your setup.

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name your.domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your.domain.com;

    ssl_certificate     /etc/ssl/certs/your.domain.com.crt;
    ssl_certificate_key /etc/ssl/private/your.domain.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY    always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;

    # Allow large uploads (match MAX_UPLOAD_MB)
    client_max_body_size 2048M;
    client_body_timeout  3600s;

    # Proxy settings
    proxy_pass_header  Server;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;   # streaming downloads
    proxy_send_timeout 3600s;
    proxy_buffering    off;     # required for streaming + WebSocket

    # WebSocket upgrade for /ws
    location /ws {
        proxy_pass          http://127.0.0.1:8080;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  86400s;
    }

    # Everything else
    location / {
        proxy_pass http://127.0.0.1:8080;
    }
}
